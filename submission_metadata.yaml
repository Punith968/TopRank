  Used GitHub Copilot for boilerplate code auto-completion.
  No candidate data was uploaded or sent to external APIs during ranking execution.

# ============================================================================
# Approach summary
# ============================================================================
methodology_summary: |
  We use a hybrid approach that separates heavy semantic model inference from ranking runtime:
  1. Offline Pre-computation: Embed candidate profiles and compute cosine similarity against the job description using all-MiniLM-L6-v2, saving scores in candidate_embeddings.npz.
  2. Honeypot Firewall: Evaluates candidates against 10 strict logical filters (career timeline consistency, tech release date violations, company founding year checks, experience-title mismatch, and skill duration checks) to reject clearly fraudulent profiles while preserving legitimate edge cases.
  3. Feature Engineering: Extracts 18 behavioural signals including JD-specific checks (LangChain-only penalty, CV/speech domain penalty, engagement recency from last_active_date) alongside consulting-firm penalties and job-hopper indicators.
  4. Scoring: Weighted combination (semantic=25%, career=25%, skill=20%, behavioral=20%, availability=10%) with Gaussian YoE suitability curve centred at 7 years.
  5. Reasoning: Fact-based, candidate-specific natural language justifications referencing actual profile data (title, company, skills, concerns).

